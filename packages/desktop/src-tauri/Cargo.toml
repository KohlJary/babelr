[package]
name = "babelr-desktop"
version = "0.1.0"
description = "Babelr Desktop — federated chat with tone-preserving translation"
authors = ["Kohl Jary"]
edition = "2021"

[lib]
name = "babelr_desktop_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-notification = "2"
tauri-plugin-deep-link = "2"
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Linux voice/media support: webkit2gtk exposes settings to enable
# MediaStream + WebRTC in the embedded webview, plus a permission-request
# signal we auto-grant for microphone access. Without this the webview
# denies getUserMedia silently and navigator.mediaDevices may be undefined.
[target.'cfg(target_os = "linux")'.dependencies]
webkit2gtk = "2.0"
