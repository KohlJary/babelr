# SPDX-License-Identifier: Hippocratic-3.0
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/shared
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: babelr
          POSTGRES_PASSWORD: babelr
          POSTGRES_DB: babelr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U babelr"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://babelr:babelr@localhost:5432/babelr_test
      - run: npm test
        env:
          TEST_DATABASE_URL: postgresql://babelr:babelr@localhost:5432/babelr_test

  db-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: babelr
          POSTGRES_PASSWORD: babelr
          POSTGRES_DB: babelr
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U babelr"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://babelr:babelr@localhost:5432/babelr
