services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: babelr
      POSTGRES_PASSWORD: babelr
      POSTGRES_DB: babelr
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U babelr"]
      interval: 5s
      timeout: 3s
      retries: 5

  babelr:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://babelr:babelr@postgres:5432/babelr
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      BABELR_DOMAIN: ${BABELR_DOMAIN:-localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      HOST: 0.0.0.0
    env_file:
      - path: .env
        required: false

volumes:
  pgdata:
